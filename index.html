<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finapina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d0f;
    --surface: #111417;
    --border: rgba(255,255,255,0.07);
    --gold: #c9a96e;
    --gold-dim: rgba(201,169,110,0.15);
    --text: #e8e4dc;
    --muted: rgba(232,228,220,0.45);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.35;
  }

  .wrap {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .logo-mark {
    width: 64px;
    height: 64px;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: rise 1.2s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
  }

  .wordmark {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: -0.02em;
    line-height: 1;
    opacity: 0;
    animation: rise 1.2s cubic-bezier(0.22,1,0.36,1) 0.45s forwards;
  }

  .wordmark em {
    font-style: italic;
    color: var(--gold);
  }

  .tagline {
    margin-top: 1.25rem;
    font-size: 0.75rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: rise 1.2s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
  }

  .divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 2.5rem auto;
    opacity: 0;
    animation: rise 1.2s cubic-bezier(0.22,1,0.36,1) 0.9s forwards;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.5rem 1rem;
    opacity: 0;
    animation: rise 1.2s cubic-bezier(0.22,1,0.36,1) 1.1s forwards;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  .corner {
    position: fixed;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: rise 1.4s cubic-bezier(0.22,1,0.36,1) 1.4s forwards;
  }
  .corner.tl { top: 2rem; left: 2rem; }
  .corner.tr { top: 2rem; right: 2rem; text-align: right; }
  .corner.bl { bottom: 2rem; left: 2rem; }
  .corner.br { bottom: 2rem; right: 2rem; text-align: right; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="wrap">

  <svg class="logo-mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="32,4 60,20 60,44 32,60 4,44 4,20" stroke="#c9a96e" stroke-width="1" fill="none" opacity="0.6"/>
    <polygon points="32,14 50,24 50,40 32,50 14,40 14,24" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="32" cy="32" r="5" fill="#c9a96e"/>
    <line x1="32" y1="4"  x2="32" y2="26" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
    <line x1="32" y1="38" x2="32" y2="60" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
    <line x1="4"  y1="20" x2="26" y2="29" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
    <line x1="38" y1="35" x2="60" y2="44" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
    <line x1="60" y1="20" x2="38" y2="29" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
    <line x1="26" y1="35" x2="4"  y2="44" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
  </svg>

  <h1 class="wordmark">Fin<em>apina</em></h1>
  <p class="tagline">Finance &middot; Intelligence &middot; Alpha</p>

  <div class="divider"></div>

  <div class="status">
    <span class="dot"></span>
    Coming soon
  </div>

</div>

<span class="corner tl">finapina.ch</span>
<span class="corner tr">&copy; 2026</span>
<span class="corner bl">St. Gallen &mdash; Switzerland</span>
<span class="corner br">Est. 2026</span>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, nodes, t = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  nodes = Array.from({length: 55}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 1.5 + 0.5
  }));
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  t += 0.005;

  nodes.forEach(n => {
    n.x += n.vx; n.y += n.vy;
    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;
  });

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 140) {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(201,169,110,${(1 - dist/140) * 0.25})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  nodes.forEach(n => {
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(201,169,110,0.6)';
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
